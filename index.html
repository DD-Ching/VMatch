<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VMatch</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☄️</text></svg>" />
  <style>
    :root {
      --ground: #05060C;
      --ink: #E8E6DF;
      --muted: #8B93A7;
      --gold: #FFC97A;
      --cyan: #8FE8FF;
      --line: rgba(139, 147, 167, 0.18);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--ground); overflow: hidden; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; color: var(--ink); }
    #stage { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
    #overlay { position: fixed; inset: 0; pointer-events: none; }
    #overlay > * { pointer-events: auto; }

    .vm-card {
      position: absolute;
      left: 50%; bottom: 2.5%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: rgba(10, 14, 22, 0.62);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 26px;
      backdrop-filter: blur(8px);
      text-align: center;
      max-width: min(420px, 86vw);
    }
    .vm-card h2 { margin: 0; font-size: 17px; font-weight: 600; letter-spacing: 0.02em; }
    .vm-card p { margin: 2px 0 8px; color: var(--muted); font-size: 13px; line-height: 1.45; }
    .vm-card button {
      background: linear-gradient(135deg, rgba(255,201,122,0.18), rgba(143,232,255,0.18));
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 30px;
      font: inherit; font-size: 15px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .vm-card button:hover { border-color: var(--gold); }
    .vm-card button:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }

    .vm-bar {
      position: absolute;
      left: 50%; bottom: 5%;
      transform: translateX(-50%);
      display: flex; gap: 12px;
    }
    .vm-bar button {
      width: 52px; height: 52px;
      display: grid; place-items: center;
      background: rgba(10, 14, 22, 0.6);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 50%;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .vm-bar button:hover { border-color: var(--gold); transform: translateY(-2px); }
    .vm-bar button:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }

    .vm-hint {
      position: absolute;
      left: 50%; top: 4%;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 12.5px;
      letter-spacing: 0.06em;
    }

    .vm-dev {
      position: absolute; right: 10px; top: 10px;
      width: 250px; max-height: 92vh; overflow-y: auto;
      background: rgba(10, 14, 22, 0.85);
      border: 1px solid var(--line); border-radius: 10px;
      padding: 12px; font-size: 11px; font-family: ui-monospace, monospace;
      pointer-events: auto;
    }
    .vm-dev-title { color: var(--gold); margin-bottom: 8px; letter-spacing: 0.1em; }
    .vm-dev label { display: grid; grid-template-columns: 86px 1fr 34px; gap: 6px; align-items: center; margin-bottom: 4px; color: var(--muted); }
    .vm-dev input[type=range] { width: 100%; accent-color: var(--cyan); }
    .vm-dev em { font-style: normal; color: var(--ink); text-align: right; }
    .vm-dev-info { color: var(--cyan); margin: 10px 0 0; white-space: pre-wrap; }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div id="overlay"></div>
  <script type="module" src="/src/app.ts"></script>
</body>
</html>
